<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StFX Meal Hall</title>

<style>

/* ================= RESET ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#f6f3ee;
}

/* ================= FOOD BACKGROUND ================= */

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(122,30,44,0.08), transparent 400px),
    radial-gradient(circle at 80% 70%, rgba(76,175,80,0.06), transparent 450px);
  z-index:-1;
}

/* ================= PAGE SYSTEM ================= */

.page{
  position:absolute;
  inset:0;
  opacity:0;
  pointer-events:none;
  transition:0.35s ease;
}

.page.active{
  opacity:1;
  pointer-events:auto;
}

/* ================= TOP BAR ================= */

.topbar{
  height:100px;
  background:#7A1E2C;
  color:white;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:42px;
  font-weight:bold;

  box-shadow:0 4px 18px rgba(0,0,0,0.2);
}

/* ================= WELCOME ================= */

#welcome{
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;

  color:white;

  background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url("https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=2000&q=80");

  background-size:cover;
  background-position:center;

  cursor:pointer;
}

.welcome-title{
  font-size:90px;
  font-weight:bold;
}

.welcome-sub{
  font-size:34px;
  margin-top:20px;
  opacity:0.9;
}

/* ================= HOME ================= */

.home{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100%;
}

.menu{
  width:1000px;
  max-width:92%;
  display:flex;
  flex-direction:column;
  gap:28px;
}

/* ================= CARDS ================= */

.card{
  display:flex;
  align-items:center;
  gap:25px;

  background:white;
  border-radius:28px;
  padding:20px;

  box-shadow:0 10px 25px rgba(0,0,0,0.12);
  cursor:pointer;

  transition:0.2s ease;
}

.card:active{
  transform:scale(0.98);
}

.card img{
  width:180px;
  height:130px;
  object-fit:cover;
  border-radius:18px;
}

/* ================= TEXT ================= */

.text h2{
  font-size:46px;
  color:#7A1E2C;
}

.text p{
  font-size:26px;
  color:#555;
}

/* ================= BLANK ================= */

.blank{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;

  font-size:64px;
  font-weight:bold;
  color:#7A1E2C;
}

/* ================= BACK BUTTON ================= */

.back{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);

  background:#7A1E2C;
  color:white;

  padding:26px 80px;
  border:none;
  border-radius:25px;

  font-size:32px;
  cursor:pointer;
}

button, .card {
  touch-action: manipulation;
}

</style>
</head>

<body>

<!-- ================= WELCOME ================= -->
<div id="welcome" class="page active" onclick="showPage('home')">

  <div>
    <div class="welcome-title">🍽️ StFX Meal Hall</div>
    <div class="welcome-sub">Tap Anywhere to Begin</div>
  </div>

</div>

<!-- ================= HOME ================= -->
<div id="home" class="page">

  <div class="topbar">Build Your Plate</div>

  <div class="home">
    <div class="menu">

      <div class="card" onclick="showPage('protein')">
        <img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?auto=format&fit=crop&w=800&q=80">
        <div class="text">
          <h2>Add Protein</h2>
          <p>Chicken, eggs, tofu & more</p>
        </div>
      </div>

      <div class="card" onclick="showPage('veg')">
        <img src="https://images.unsplash.com/photo-1540420773420-3366772f4999?auto=format&fit=crop&w=800&q=80">
        <div class="text">
          <h2>Add Vegetables</h2>
          <p>Fresh greens & salads</p>
        </div>
      </div>

      <div class="card" onclick="showPage('fibre')">
        <img src="https://images.unsplash.com/photo-1604908554165-5f1a9d1b5c2d?auto=format&fit=crop&w=800&q=80">
        <div class="text">
          <h2>Add Fibre</h2>
          <p>Rice, grains & whole foods</p>
        </div>
      </div>

    </div>
  </div>

</div>

<!-- ================= PAGES ================= -->
<div id="protein" class="page">
  <div class="topbar">Add Protein</div>
  <div class="blank">Coming Soon</div>
  <button class="back" onclick="showPage('home')">← Back</button>
</div>

<div id="veg" class="page">
  <div class="topbar">Add Vegetables</div>
  <div class="blank">Coming Soon</div>
  <button class="back" onclick="showPage('home')">← Back</button>
</div>

<div id="fibre" class="page">
  <div class="topbar">Add Fibre</div>
  <div class="blank">Coming Soon</div>
  <button class="back" onclick="showPage('home')">← Back</button>
</div>

<script>

let timer;

function showPage(id){

  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");

  currentPage = id;

  resetTimer();
}

/* ================= AUTO RESET SYSTEM ================= */

function resetTimer(){

  clearTimeout(timer);

  timer = setTimeout(()=>{

    // go back to home after inactivity
    showPage("home");

    // then go to welcome after extra idle time
    timer = setTimeout(()=>{
      showPage("welcome");
    }, 10000);

  }, 60000);

}

["click","touchstart","mousemove"].forEach(evt=>{
  document.addEventListener(evt, resetTimer);
});

resetTimer();

</script>

</body>
</html>
